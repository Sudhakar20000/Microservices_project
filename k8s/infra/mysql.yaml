apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: banking
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root1234"
  MYSQL_DATABASE: "banking_core"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: banking
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: banking
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  # NO clusterIP: None — regular ClusterIP so nc can resolve it

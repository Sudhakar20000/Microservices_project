apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: banking
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: sudhakar20000/ib-user-service:latest
          ports:
            - containerPort: 8083
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: banking
spec:
  selector:
    app: user-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
